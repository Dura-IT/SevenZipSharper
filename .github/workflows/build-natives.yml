name: Build native libraries

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/7zip-version
    branches: [main]

concurrency:
  group: build-natives-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unix:
    name: ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest  # Apple Silicon
            rid: osx-arm64
          - os: macos-13      # Intel
            rid: osx-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends make g++

      - name: Build native library
        env:
          CC: ${{ runner.os == 'macOS' && 'clang' || 'gcc' }}
          CXX: ${{ runner.os == 'macOS' && 'clang++' || 'g++' }}
        run: bash scripts/fetch-natives.sh

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-${{ matrix.rid }}
          path: src/SevenZipSharper.Native/runtimes/${{ matrix.rid }}/native/

  windows:
    name: win-x64 + win-arm64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Download and extract DLLs
        shell: pwsh
        run: scripts\fetch-natives.ps1

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-win-x64
          path: src/SevenZipSharper.Native/runtimes/win-x64/native/

      - name: Upload win-arm64 artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-win-arm64
          path: src/SevenZipSharper.Native/runtimes/win-arm64/native/

  pack:
    name: Pack NuGet packages
    needs: [unix, windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Download all native artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: native-*
          merge-multiple: false

      - name: Arrange artifacts into runtimes layout
        run: |
          for rid in osx-arm64 osx-x64 linux-x64 linux-arm64 win-x64 win-arm64; do
            dest="src/SevenZipSharper.Native/runtimes/$rid/native"
            mkdir -p "$dest"
            cp -r "native-$rid/." "$dest/"
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: 10.x

      - name: Pack
        run: |
          dotnet pack src/SevenZipSharper/SevenZipSharper.csproj -c Release --nologo
          dotnet pack src/SevenZipSharper.Native/SevenZipSharper.Native.csproj -c Release --nologo

      - name: Upload packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nupkg
          path: artifacts/packages/*.nupkg

name: Build native libraries

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/7zip-version
    branches: [main]

concurrency:
  group: build-natives-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unix:
    name: ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest  # cross-compile x64 on Apple Silicon
            rid: osx-x64
            cc: clang -arch x86_64
            cxx: clang++ -arch x86_64
            target_rid: osx-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends make g++

      - name: Set compiler env vars
        shell: bash
        run: |
          if [[ "${{ matrix.cc }}" != "" ]]; then
            echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
            echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          fi
          if [[ "${{ matrix.target_rid }}" != "" ]]; then
            echo "TARGET_RID=${{ matrix.target_rid }}" >> $GITHUB_ENV
          fi

      - name: Build native library
        run: bash scripts/fetch-natives.sh

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-${{ matrix.rid }}
          path: src/SevenZipSharper.Native/runtimes/${{ matrix.rid }}/native/

  windows:
    name: win-x64 + win-arm64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Download and extract DLLs
        shell: pwsh
        run: scripts\fetch-natives.ps1

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-win-x64
          path: src/SevenZipSharper.Native/runtimes/win-x64/native/

      - name: Upload win-arm64 artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-win-arm64
          path: src/SevenZipSharper.Native/runtimes/win-arm64/native/

  publish-release:
    name: Publish natives to GitHub release
    needs: [unix, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Download all native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-*
          merge-multiple: false

      - name: Arrange artifacts into runtimes layout
        run: |
          for rid in osx-arm64 osx-x64 linux-x64 linux-arm64 win-x64 win-arm64; do
            dest="src/SevenZipSharper.Native/runtimes/$rid/native"
            mkdir -p "$dest"
            cp -r "native-$rid/." "$dest/"
          done

      - name: Create natives archive
        id: archive
        run: |
          VERSION=$(cat scripts/7zip-version)
          cd src/SevenZipSharper.Native
          tar czf "natives-v$VERSION.tar.gz" runtimes/
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "path=src/SevenZipSharper.Native/natives-v$VERSION.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.archive.outputs.version }}
          TAG="natives-v$VERSION"
          ASSET="natives-v$VERSION.tar.gz"
          if gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; then
            echo "::error::Asset $ASSET already exists on release $TAG. Native artifacts are immutable per 7-Zip version."
            echo "::error::To force a rebuild, explicitly delete the existing asset first:"
            echo "::error::  gh release delete-asset $TAG $ASSET --repo ${{ github.repository }}"
            exit 1
          fi
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "7-Zip natives v$VERSION" \
              --notes "Prebuilt 7-Zip $VERSION native libraries for all supported RIDs (win-x64, win-arm64, osx-arm64, osx-x64, linux-x64, linux-arm64). Consumed by CI and publish workflows."
          fi
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            "${{ steps.archive.outputs.path }}"

name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: 10.x

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Test
        run: dotnet test -c Release --nologo --no-build

      - name: Pack
        run: |
          dotnet pack src/SevenZipSharper/SevenZipSharper.csproj -c Release --nologo
          dotnet pack src/SevenZipSharper.Native/SevenZipSharper.Native.csproj -c Release --nologo

      - name: Get NuGet publish token
        id: get-nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const oidcToken = await core.getIDToken('nuget.org');
            const response = await fetch('https://api.nuget.org/v1/publish/authenticate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ oidcToken })
            });
            if (!response.ok) {
              core.setFailed(`NuGet auth failed (${response.status}): ${await response.text()}`);
              return;
            }
            const { tokenValue } = await response.json();
            core.setSecret(tokenValue);
            core.setOutput('token', tokenValue);

      - name: Push to NuGet.org
        run: >
          dotnet nuget push artifacts/packages/*.nupkg
          --api-key ${{ steps.get-nuget-token.outputs.token }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

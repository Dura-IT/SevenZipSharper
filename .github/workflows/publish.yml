name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
      contents: read   # required for gh release download

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: 10.x

      - name: Download prebuilt 7-Zip natives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat scripts/7zip-version)
          gh release download "natives-v$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "natives-v$VERSION.tar.gz" \
            --output natives.tar.gz
          tar xzf natives.tar.gz -C src/SevenZipSharper.Native/
          mkdir -p runtimes
          cp -r src/SevenZipSharper.Native/runtimes/. runtimes/
          rm natives.tar.gz

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Test
        run: dotnet test -c Release --nologo --no-build

      - name: Pack
        run: |
          dotnet pack src/SevenZipSharper/SevenZipSharper.csproj -c Release --nologo
          dotnet pack src/SevenZipSharper.Native/SevenZipSharper.Native.csproj -c Release --nologo

      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1.2.0
        with:
          user: DuraITSolutions

      - name: Push to NuGet.org
        run: >
          dotnet nuget push artifacts/packages/*.nupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

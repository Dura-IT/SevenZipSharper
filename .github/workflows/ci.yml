name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: |
            8.x
            10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Build
        run: dotnet build -c Release --nologo

  test:
    name: test + sonar (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0  # Sonar requires full history for blame and new-code detection

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: |
            8.x
            10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Download prebuilt 7-Zip natives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat scripts/7zip-version)
          gh release download "natives-v$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "natives-v$VERSION.tar.gz" \
            --output natives.tar.gz
          tar xzf natives.tar.gz -C src/SevenZipSharper.Native/
          mkdir -p runtimes
          cp -r src/SevenZipSharper.Native/runtimes/. runtimes/
          rm natives.tar.gz

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Sonar begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"Dura-IT_SevenZipSharper"
          /o:"durait"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Test (unit + integration with coverage)
        run: >
          dotnet test -c Release --nologo --no-build
          --collect:"XPlat Code Coverage"
          --results-directory coverage
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Sonar end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  pack:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Pack managed library
        run: dotnet pack src/SevenZipSharper/SevenZipSharper.csproj -c Release --nologo

      - name: Pack native package
        run: dotnet pack src/SevenZipSharper.Native/SevenZipSharper.Native.csproj -c Release --nologo

      - name: Upload packages
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: nupkg
          path: artifacts/packages/*.nupkg

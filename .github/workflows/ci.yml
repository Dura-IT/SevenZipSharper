name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Compiles the full solution on Ubuntu and runs unit tests under SonarCloud
  # with OpenCover coverage. This is the only job that measures coverage.
  unit-tests:
    name: build + unit-tests + sonar (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0  # Sonar requires full history for blame and new-code detection

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: |
            8.x
            10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Sonar begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"Dura-IT_SevenZipSharper"
          /o:"durait"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Test (unit, with coverage)
        run: >
          dotnet test tests/SevenZipSharper.UnitTests/SevenZipSharper.UnitTests.csproj
          -c Release --nologo --no-build
          --collect:"XPlat Code Coverage"
          --results-directory coverage
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Sonar end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  # Compiles the full solution and runs integration tests against the real
  # native 7-Zip library on each supported OS/RID. No Sonar wrap and no
  # coverage — this matrix exists to catch cross-platform interop regressions.
  # Covers all six shipped RIDs: linux-x64, linux-arm64, win-x64, win-arm64,
  # osx-arm64, osx-x64.
  integration-tests:
    name: build + integration-tests (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-13
            rid: osx-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: |
            8.x
            10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Download prebuilt 7-Zip natives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(cat scripts/7zip-version)
          gh release download "natives-v$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "natives-v$VERSION.tar.gz" \
            --output natives.tar.gz
          tar xzf natives.tar.gz -C src/SevenZipSharper.Native/
          mkdir -p runtimes
          cp -r src/SevenZipSharper.Native/runtimes/. runtimes/
          rm natives.tar.gz

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Test (integration)
        run: >
          dotnet test tests/SevenZipSharper.IntegrationTests/SevenZipSharper.IntegrationTests.csproj
          -c Release --nologo --no-build

  # Smoke test only — packs both nupkgs to confirm the metadata is well-formed.
  # The real release pack happens in publish.yml on tag push. Gated on both
  # test jobs so a broken managed contract or interop regression blocks pack.
  pack:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Pack managed library
        run: dotnet pack src/SevenZipSharper/SevenZipSharper.csproj -c Release --nologo

      - name: Pack native package
        run: dotnet pack src/SevenZipSharper.Native/SevenZipSharper.Native.csproj -c Release --nologo

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nupkg
          path: artifacts/packages/*.nupkg
